# RevBench production stack (docs/DECISIONS.md D10).
#
# Differs from docker-compose.yml (local/dev) in two security-relevant ways:
#   1. The API port is NOT published — only the web app is reachable from the
#      host. The frontend talks to the API over the internal compose network,
#      so the unauthenticated read-only API never faces the public internet.
#   2. The backend has a healthcheck and the frontend waits for it to be ready.
#
# Run it explicitly (it does not auto-merge with the dev file):
#   docker compose -f docker-compose.prod.yml up -d
# Bootstrap the DB first on a fresh host: scripts/bootstrap.sh
#
# DuckDB is single-writer across processes (docs/REVISIT.md R11): the API mounts
# the DB read-only; the optional `scheduler` writer is gated behind a profile.

services:
  backend:
    image: revbench-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Reads the published snapshot, never the live store — so the API never
      # contends with the nightly writer for DuckDB's lock (docs/REVISIT.md R11).
      # Created by the pipeline's publish step (`python -m data_pipeline.publish`).
      REVBENCH_DB: /data/revbench-read.duckdb
      REVBENCH_CORS: ${PUBLIC_ORIGIN:-http://localhost:3000}
    volumes:
      - ./data:/data:ro
    # No `ports:` — the API is internal-only. Reach it via the frontend.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      API_URL: http://backend:8000 # server-side fetch over the compose network
    # Not published publicly — Caddy reaches it over the compose network and is
    # the only public entry point. Bound to localhost only for host-side curl.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Reverse proxy — the single public entry point. Serves the web app on :80
  # (and :443 once a domain is configured in ./Caddyfile).
  caddy:
    image: caddy:2-alpine
    environment:
      # Unset -> ":80" (HTTP). Set SITE_ADDRESS=your-domain in .env to switch on
      # automatic HTTPS. (Default is ":80" here, not empty: Caddy treats an
      # empty-but-set var as an invalid site address and refuses to start.)
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

  # Optional nightly writer: data -> agents -> fusion -> enrichment.
  # Enable with:  docker compose -f docker-compose.prod.yml --profile scheduler up -d
  # Accumulates the agent-signal / news history the research conclusion needs
  # (docs/REVISIT.md R1/R2). Expect brief API read blips while it holds the lock.
  scheduler:
    profiles: ["scheduler"]
    # Reuse the backend image (same Dockerfile) instead of building a separate,
    # profile-gated image that `compose build` would skip and leave stale.
    image: revbench-backend:latest
    command: ["python", "-m", "data_pipeline.scheduler"]
    environment:
      REVBENCH_DB: /data/revbench.duckdb
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      AGENT_DAILY_BUDGET_USD: ${AGENT_DAILY_BUDGET_USD:-1}
      EDGAR_USER_AGENT: ${EDGAR_USER_AGENT}
    volumes:
      - ./data:/data
    restart: unless-stopped

volumes:
  caddy_data: # Caddy's TLS certs / state (persists across restarts)
  caddy_config:
